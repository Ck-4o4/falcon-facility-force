kind = "web"
previewPath = "/"
title = "Falcon Facility Force"
version = "1.0.0"
id = "artifacts/falcon-facility-force"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21847

[services.development]
run = "pnpm --filter @workspace/falcon-facility-force run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/falcon-facility-force", "run", "build" ]
publicDir = "artifacts/falcon-facility-force/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21847"
BASE_PATH = "/"
